name: Automated Command OS Tests

on:
  schedule:
    # Daily at 02:00 UTC
    - cron: '0 2 * * *'
    # Weekly on Sunday at 03:00 UTC
    - cron: '0 3 * * 0'
    # Monthly on 1st at 04:00 UTC
    - cron: '0 4 1 * *'
  workflow_dispatch:
    inputs:
      scope:
        description: 'Test Scope (unit, full)'
        required: false
        default: 'full'

jobs:
  test_suite:
    name: Run Test Suite
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Type Check (Compilation)
        # We allow compilation to fail on visual tests by excluding them in tsconfig.json locally,
        # but in CI we might want to check everything or be lenient.
        # For now, we run it and if it fails, the job fails.
        run: npx tsc --noEmit
        
      - name: Run Unit & Integration Tests
        run: npm run test -- --reporter=verbose
        
      - name: Install Playwright Browsers
        if: github.event_name == 'schedule' && (cron(github.event.schedule) == '0 3 * * 0' || cron(github.event.schedule) == '0 4 1 * *') || github.event.inputs.scope == 'full'
        run: npx playwright install --with-deps chromium
        
      - name: Run E2E Tests (Visual/Functional)
        if: github.event_name == 'schedule' && (cron(github.event.schedule) == '0 3 * * 0' || cron(github.event.schedule) == '0 4 1 * *') || github.event.inputs.scope == 'full'
        # We use continue-on-error because E2E tests are known to be flaky/failing currently
        continue-on-error: true
        run: npm run test:visual
