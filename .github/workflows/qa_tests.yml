name: Enterprise Autonomous QA Audit

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]
  schedule:
    - cron: '0 0 * * *' # Daily at midnight

jobs:
  autonomous_qa:
    name: Level 5 Autonomous Testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_DATABASE_ID }}
      VITE_USER_ID: ${{ secrets.VITE_USER_ID }}
      PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Vitest Unit Tests
        run: npm run test -- --run

      - name: Run Autonomous Audit (Level 5)
        run: npm run test:audit
        continue-on-error: true # Allow reporting even if one suite fails

      - name: Generate Coverage Report
        run: npm run test:coverage

      - name: Run Mutation Testing (Stryker)
        run: npm run test:mutation
        if: github.event_name == 'schedule' # Only run mutations on daily schedule to save time

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: autonomous-qa-reports
          path: |
            GLOBAL_QUALITY_STATUS.md
            ENTERPRISE_QA_AUDIT.md
            playwright-report/
            test-results/
            coverage/
